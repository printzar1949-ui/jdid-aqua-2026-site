<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaVia</title>

<style>
body{
  font-family: Arial, sans-serif;
  background-color:#0a192f;
  color:white;
  margin:0;
  text-align:center;
}

header{
  background:#00aaff;
  padding:20px;
  font-size:28px;
}

.card{
  background:#112240;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:600px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<header>🌊 أكوافيا - AquaVia</header>

<div class="card">
<h2>الماء من الهواء</h2>
<p>مشروع بيئي لتحويل الهواء إلى مياه نظيفة باستخدام تقنيات التكثيف.</p>
</div>

<div class="card">
<h3>💡 حول المشروع</h3>
<p>استخراج الرطوبة من الهواء وتحويلها إلى ماء صالح للاستخدام.</p>
</div>

<div class="card">
<h3>🌍 الأهداف</h3>
<ul style="list-style:none; padding:0;">
<li>✔ توفير مياه شرب نظيفة</li>
<li>✔ حل مشكلة شح المياه</li>
<li>✔ حماية البيئة</li>
</ul>
</div>

<div class="card">
<h3>👤 المطور</h3>
<p><strong>نزار بشير جديد</strong></p>
</div>

</body>
</html>
